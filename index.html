<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Videomera</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif;
        background: #f6f8fb;
        color: #0f1824;
      }
      body {
        margin: 0;
        padding: 48px 24px;
        display: flex;
        justify-content: center;
      }
      main {
        max-width: 720px;
        width: 100%;
        background: white;
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(17, 34, 68, 0.12);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 36px;
      }
      p {
        line-height: 1.6;
        margin: 0 0 16px 0;
      }
      nav a {
        display: inline-block;
        margin-right: 16px;
        color: #0a5d72;
        text-decoration: none;
        font-weight: 600;
      }
      nav a:hover {
        text-decoration: underline;
      }
      .tagline {
        color: #5b6b7b;
      }
      .card {
        margin-top: 24px;
        padding: 20px;
        border-radius: 16px;
        background: #f0f4f8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Videomera</h1>
      <p class="tagline">Fast video merge for macOS.</p>
      <nav>
        <a href="support.html">Support</a>
        <a href="privacy.html">Privacy Policy</a>
      </nav>
      <div class="card">
        <p>Videomera lets you import clips, reorder them, and export a single merged file quickly.</p>
        <p>If you need help, visit the Support page or email <strong>eraappai@gmail.com</strong>.</p>
      </div>
    </main>
  </body>
</html>
